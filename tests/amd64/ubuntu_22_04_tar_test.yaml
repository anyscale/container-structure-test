schemaVersion: '2.0.0'
fileContentTests:
- name: 'Debian Sources'
  excludedContents: ['.*gce_debian_mirror.*']
  expectedContents: ['.*archive\.ubuntu\.com.*']
  path: '/etc/apt/sources.list'
- name: 'Passwd file'
  expectedContents: ['root:x:0:0:root:/root:/bin/bash']
  path: '/etc/passwd'
fileExistenceTests:
- name: 'Date'
  path: '/bin/date'
  isExecutableBy: 'owner'
- name: 'Hosts File'
  path: '/etc/hosts'
  shouldExist: true
- name: 'Dummy File'
  path: '/etc/dummy'
  shouldExist: false
licenseTests:
- debian: false
  files:
    - "/usr/share/doc/ubuntu-keyring/copyright"
    - "/usr/share/doc/dash/copyright"
