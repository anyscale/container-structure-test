schemaVersion: '2.0.0' # Make sure to test the latest schema version
commandTests:
- name: "Test Capabilities containerRunOptions"
  command: "capsh"
  args: ["--print"]
  expectedOutput:
    - ".*cap_sys_admin.*"
  excludedOutput:
    # match chown only where it is GRANTED (e.g. ",cap_chown"), not capsh's
    # "!cap_chown" marker that indicates it was dropped
    - "[^!]cap_chown"
- name: "Test bindMounts containerRunOptions"
  command: "test"
  args:
    - "-d"
    - "/tmp/test"
  exitCode: 0
containerRunOptions:
  capabilities:
    - "sys_admin"
  drop_capabilities:
    - "chown"
  bindMounts:
    - "/tmp/test:/tmp/test"
